<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Statement Converter API Docs</title>
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference('#app', {
        url: 'https://api.statementconverter.ru/openapi/v1/openapi.json',
        theme: 'saturn',
        layout: 'modern',
        showSidebar: true,
        hideDownloadButton: false
      });
    </script>
  </body>
</html>
